server:
  port: 8081

spring:
  datasource:
    url: "${DB_URL:jdbc:sqlserver://localhost:1433;instanceName=SQLEXPRESS;databaseName=ecommerce_auth_db;encrypt=true;trustServerCertificate=true}"
    username: "${DB_USER:ecommerce-spring-user}"
    # Do NOT hardcode the password in the repo. Use environment variable DB_PASSWORD or a secrets manager.
    password: "${DB_PASSWORD:}"
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 1800000
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.SQLServerDialect

  application:
    name: auth-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: myVeryLongSecretKeyForJwtAuthenticationAndAuthorization123456
  expiration: 3600000
  refresh-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: "*"