server:
  port: 8081

spring:

  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=ecommerce_auth_db;integratedSecurity=true;encrypt=true;trustServerCertificate=true;
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true

  application:
    name: auth-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: myVeryLongSecretKeyForJwtAuthenticationAndAuthorization123456
  expiration: 3600000
  refresh-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: "*"