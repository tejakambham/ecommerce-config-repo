server:
  port: 8081

spring:

  datasource:
    # Use explicit TCP port (default SQL Server port 1433). Replace username/password with real credentials
    url: jdbc:sqlserver://localhost:1433;databaseName=ecommerce_auth_db;encrypt=false;trustServerCertificate=true
    username: db_user
    password: db_password
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: validate

    show-sql: true

    properties:
      hibernate:
        format_sql: true
        # Explicit dialect for Microsoft SQL Server to avoid "Unable to determine Dialect without JDBC metadata"
        dialect: org.hibernate.dialect.SQLServerDialect
      # Also provide the persistence URL as a fallback for metadata-driven lookup
      jakarta.persistence.jdbc.url: jdbc:sqlserver://localhost:1433;databaseName=ecommerce_auth_db;encrypt=false;trustServerCertificate=true

  application:
    name: auth-service

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka

jwt:
  secret: myVeryLongSecretKeyForJwtAuthenticationAndAuthorization123456
  expiration: 3600000
  refresh-expiration: 604800000

management:
  endpoints:
    web:
      exposure:
        include: "*"